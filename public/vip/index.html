<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0A1226;--green:#00E87B;--gold:#FFB800;
--mauve:#A855F7;--blue:#1E5FFF;
--text:#FAFAFA;--text-dim:#8B92A8;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* Orbes fond */
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none;z-index:0}
.orb-1{width:300px;height:300px;background:var(--blue);top:10%;left:-10%;animation:drift1 16s ease-in-out infinite alternate}
.orb-2{width:250px;height:250px;background:var(--mauve);top:30%;right:-8%;animation:drift2 14s ease-in-out infinite alternate}
.orb-3{width:200px;height:200px;background:var(--green);bottom:15%;left:20%;animation:drift3 18s ease-in-out infinite alternate}
.orb-4{width:180px;height:180px;background:var(--gold);bottom:5%;right:15%;animation:drift1 15s ease-in-out infinite alternate-reverse}
@keyframes drift1{0%{transform:translate(0,0)}100%{transform:translate(30px,-20px)}}
@keyframes drift2{0%{transform:translate(0,0)}100%{transform:translate(-20px,30px)}}
@keyframes drift3{0%{transform:translate(0,0)}100%{transform:translate(15px,25px)}}

/* Sparkles */
.sparkle{position:fixed;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.6);pointer-events:none;z-index:1;animation:sparkle 3.5s ease-in-out infinite}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}

/* Nav */
.nav{position:sticky;top:0;z-index:100;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,18,38,.6);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem}
.nav-logo span{color:var(--green)}
.nav-btn{padding:8px 18px;border-radius:50px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);font-weight:600;font-size:.82rem;text-decoration:none;transition:background .2s}
.nav-btn:hover{background:rgba(255,255,255,.12)}

/* Carrousel */
.carousel-section{overflow:hidden;position:relative;padding:24px 0;z-index:2}
.carousel-track{display:flex;gap:16px;animation:slideRight 90s linear infinite;width:max-content}
.carousel-track:hover{animation-play-state:paused}
.carousel-tile{width:260px;height:400px;border-radius:18px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);cursor:zoom-in;transition:transform .25s,box-shadow .25s}
.carousel-tile:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 12px 32px rgba(0,232,123,.2);border-color:rgba(0,232,123,.3)}
.carousel-tile img{width:100%;height:100%;object-fit:cover;object-position:right center}
.carousel-fade-l,.carousel-fade-r{position:absolute;top:0;bottom:0;width:60px;z-index:3;pointer-events:none}
.carousel-fade-l{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.carousel-fade-r{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
@keyframes slideRight{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@media(max-width:600px){.carousel-tile{width:200px;height:320px}}

/* Lightbox zoom */
.lb-wrap{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out}
.lb-wrap.show{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lb-img{max-width:95vw;max-height:92vh;border-radius:12px;box-shadow:0 20px 80px rgba(0,0,0,.6);animation:zoomIn .25s ease}
@keyframes zoomIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.lb-close{position:absolute;top:20px;right:24px;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:1.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lb-close:hover{background:rgba(255,255,255,.22)}

/* Main */
.main{display:flex;align-items:center;justify-content:center;padding:20px 20px 40px;position:relative;z-index:2}

/* Card principale */
.card{max-width:400px;width:100%;padding:40px 28px;border-radius:24px;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:50px;background:rgba(0,232,123,.08);border:1px solid rgba(0,232,123,.15);font-size:.72rem;color:var(--green);font-weight:600;margin-bottom:20px;text-transform:uppercase;letter-spacing:.06em}

/* Channel buttons */
.channels{display:flex;flex-direction:column;gap:14px}
.ch-btn{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;padding:15px 20px;border-radius:14px;font-weight:700;font-size:.95rem;text-decoration:none;color:#fff;transition:transform .2s,box-shadow .2s;overflow:visible}
.ch-btn:hover{transform:translateY(-2px)}
.ch-1xbet{background:linear-gradient(135deg,#1a5276,#10306b);box-shadow:0 4px 20px rgba(26,82,118,.3)}
.ch-wa{background:linear-gradient(135deg,#25D366,#128C7E);box-shadow:0 4px 20px rgba(37,211,102,.25)}
.ch-tg{background:linear-gradient(135deg,#2AABEE,#1E88E5);box-shadow:0 4px 20px rgba(42,171,238,.25)}
.ch-btn svg{width:22px;height:22px;flex-shrink:0}

/* Curseurs clic alternés (WA puis TG) */
.ch-btn .cur,.ch-btn .cur-ring{opacity:0;pointer-events:none;position:absolute;right:-12px;bottom:-6px}
.ch-btn .cur{width:26px;height:26px}
.ch-btn .cur svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.ch-btn .cur-ring{width:20px;height:20px;border-radius:50%;border:2px solid #fff;right:-8px;bottom:-2px}
.ch-wa .cur,.ch-wa .cur-ring{animation:curMoveA 6s ease-in-out infinite}
.ch-tg .cur,.ch-tg .cur-ring{animation:curMoveB 6s ease-in-out infinite}
@keyframes curMoveA{0%{opacity:0;transform:translate(20px,-20px)}8%{opacity:1;transform:translate(0,0)}16%{transform:translate(1px,2px)}18%{transform:translate(0,0)}30%{opacity:1;transform:translate(0,0)}40%{opacity:0;transform:translate(-20px,20px)}100%{opacity:0;transform:translate(20px,-20px)}}
@keyframes curMoveB{0%,50%{opacity:0;transform:translate(20px,-20px)}58%{opacity:1;transform:translate(0,0)}66%{transform:translate(1px,2px)}68%{transform:translate(0,0)}80%{opacity:1;transform:translate(0,0)}90%{opacity:0;transform:translate(-20px,20px)}100%{opacity:0;transform:translate(20px,-20px)}}
@keyframes curRingA{0%,16%{opacity:0;transform:scale(.5)}18%{opacity:.6;transform:scale(1)}24%{opacity:0;transform:scale(1.8)}100%{opacity:0;transform:scale(.5)}}
@keyframes curRingB{0%,66%{opacity:0;transform:scale(.5)}68%{opacity:.6;transform:scale(1)}74%{opacity:0;transform:scale(1.8)}100%{opacity:0;transform:scale(.5)}}
.ch-wa .cur-ring{animation:curRingA 6s ease-in-out infinite}
.ch-tg .cur-ring{animation:curRingB 6s ease-in-out infinite}

.note{margin-top:24px;color:var(--gold);font-size:.72rem;font-weight:600}

/* ========== POPUP MODAL (classes anti-adblock) ========== */
.modal-wrap{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .5s}
.modal-wrap.show{opacity:1;pointer-events:auto}
.modal-box{max-width:370px;width:100%;padding:40px 30px 36px;border-radius:28px;background:linear-gradient(145deg,#E8ECF2,#D0D6E0);border:1px solid rgba(255,255,255,.6);box-shadow:0 20px 60px rgba(0,0,0,.3),0 2px 0 rgba(255,255,255,.8) inset,0 -2px 6px rgba(0,0,0,.08) inset;text-align:center;position:relative;overflow:visible;transform:translateY(40px) scale(.9) rotateX(8deg);transition:transform .5s cubic-bezier(.175,.885,.32,1.275)}
.modal-wrap.show .modal-box{transform:translateY(0) scale(1) rotateX(0deg)}
.modal-box::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.3) 50%,transparent 60%);animation:shine 4s ease-in-out infinite;pointer-events:none}
@keyframes shine{0%{transform:translateX(-100%) translateY(-100%)}100%{transform:translateX(100%) translateY(100%)}}
.modal-box::after{content:'';position:absolute;inset:-2px;border-radius:30px;background:linear-gradient(135deg,rgba(0,232,123,.4),rgba(30,95,255,.3),rgba(168,85,247,.3));z-index:-1;filter:blur(8px);opacity:.6;animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.02)}}
.modal-dismiss{position:absolute;top:14px;right:18px;background:rgba(0,0,0,.06);border:none;color:#666;font-size:1.1rem;cursor:pointer;padding:4px 10px;border-radius:50%;transition:all .2s;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.modal-dismiss:hover{background:rgba(0,0,0,.12);color:#333}
.modal-icon{margin-bottom:18px;animation:iconFloat 3s ease-in-out infinite;filter:drop-shadow(0 4px 8px rgba(0,232,123,.3))}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.modal-heading{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:700;margin-bottom:10px;letter-spacing:-.02em;color:#0A1226}
.modal-info{color:#555;font-size:.82rem;margin-bottom:26px;line-height:1.6}
.modal-action{position:relative;display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;border-radius:16px;overflow:visible;background:linear-gradient(135deg,#0A1226,#152244);color:#fff;font-weight:800;font-size:.95rem;text-decoration:none;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(10,18,38,.35),0 2px 0 rgba(255,255,255,.05) inset;transition:transform .2s,box-shadow .2s}
.modal-action:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(10,18,38,.5)}
.modal-action:active{transform:translateY(0);box-shadow:0 4px 12px rgba(10,18,38,.3)}
.modal-action img{height:22px;object-fit:contain}
.modal-action .m-cur{position:absolute;pointer-events:none;width:26px;height:26px;right:-14px;bottom:-8px}
.modal-action .m-cur svg{width:100%;height:100%;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}
.modal-action .m-cur-ring{position:absolute;width:20px;height:20px;border-radius:50%;border:2px solid var(--green);right:-10px;bottom:-4px;pointer-events:none;opacity:0}
.modal-action .m-cur,.modal-action .m-cur-ring{animation:mCurMove 3.4s ease-in-out infinite}
.modal-action .m-cur-ring{animation:mCurRing 3.4s ease-in-out infinite}
@keyframes mCurMove{0%{opacity:0;transform:translate(20px,-20px)}25%{opacity:1;transform:translate(0,0)}40%{transform:translate(1px,2px)}45%{transform:translate(0,0)}60%{opacity:1;transform:translate(0,0)}80%{opacity:0;transform:translate(-20px,20px)}100%{opacity:0;transform:translate(20px,-20px)}}
@keyframes mCurRing{0%,40%{opacity:0;transform:scale(.5)}45%{opacity:.6;transform:scale(1)}55%{opacity:0;transform:scale(1.8)}100%{opacity:0;transform:scale(.5)}}

/* Responsive */
@media(min-width:600px){.card{padding:50px 36px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}}
</style>
</head>

<script>
/* Carrousel — N = nombre de coupons dans /vip/coupons/ */
(function(){
  var track = document.getElementById('carousel');
  var tiles = '';
  var N = 29; // nombre d'images dans /vip/coupons/
  for (var i = 1; i <= N; i++) {
    tiles += '<div class="carousel-tile" data-src="/vip/coupons/coupon' + i + '.webp"><img src="/vip/coupons/coupon' + i + '.webp" alt="Coupon ' + i + '" loading="lazy" onerror="this.parentNode.style.display=\'none\'"></div>';
  }
  track.innerHTML = tiles + tiles;

  // Clic sur tuile → ouvre lightbox
  track.addEventListener('click', function(e){
    var tile = e.target.closest('.carousel-tile');
    if (!tile) return;
    var src = tile.getAttribute('data-src');
    if (!src) return;
    var lb = document.getElementById('lightbox');
    document.getElementById('lbImg').src = src;
    lb.classList.add('show');
  });
})();

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
}
document.getElementById('lightbox').addEventListener('click', function(e){
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeLightbox();
});

/* Popup après 5s */
setTimeout(function(){
  document.getElementById('dlmodal').classList.add('show');
}, 5000);

function closePopup(){
  document.getElementById('dlmodal').classList.remove('show');
}

document.getElementById('dlmodal').addEventListener('click', function(e){
  if (e.target === this) closePopup();
});
</script>
