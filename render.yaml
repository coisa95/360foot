services:
  - type: worker
    name: 360foot-cron
    runtime: node
    region: frankfurt
    plan: free
    rootDir: workers
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: SITE_URL
        value: https://360-foot.com
      - key: CRON_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: 360foot-og
    runtime: node
    region: frankfurt
    plan: free
    rootDir: og-service
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
